<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector QR y Registro</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        :root {
            --primary-color: #007bff;
            --danger-color: #dc3545;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-top: 0;
        }

        #reader {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            display: none; /* Oculto por defecto */
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .history-container {
            margin-top: 20px;
            text-align: left;
        }

        .history-item {
            background: #f9f9f9;
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 14px;
        }

        .history-item strong {
            display: block;
            color: var(--primary-color);
            margin-bottom: 4px;
        }

        .timestamp {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Lector de Códigos QR</h2>
        
        <div id="reader"></div>
        
        <button id="btn-start" class="btn">📷 Activar Cámara</button>
        <button id="btn-stop" class="btn btn-danger" style="display: none;">Detener Cámara</button>
        
        <div class="history-container">
            <h3>Registros Guardados</h3>
            <button id="btn-clear" class="btn btn-danger" style="font-size: 14px; padding: 8px;">🗑️ Borrar Historial</button>
            <div id="history-list">
                </div>
        </div>
    </div>

    <script>
        let html5QrCode;
        let isScanning = false;
        
        // Variables de la interfaz
        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnClear = document.getElementById('btn-clear');
        const readerDiv = document.getElementById('reader');
        const historyList = document.getElementById('history-list');

        // Cargar registros previos de la memoria del navegador
        let registrosQR = JSON.parse(localStorage.getItem('registrosQR')) || [];

        // Función para mostrar los registros en pantalla
        function renderizarHistorial() {
            historyList.innerHTML = '';
            if (registrosQR.length === 0) {
                historyList.innerHTML = '<p style="text-align:center; color:#888;">No hay registros aún.</p>';
                return;
            }
            
            // Mostrar los más recientes primero
            const registrosInvertidos = [...registrosQR].reverse();
            
            registrosInvertidos.forEach(registro => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `
                    <strong>Dato: ${registro.dato}</strong>
                    <span class="timestamp">📅 ${registro.fecha} ⏱️ ${registro.hora}</span>
                `;
                historyList.appendChild(div);
            });
        }

        // Iniciar la cámara
        btnStart.addEventListener('click', () => {
            html5QrCode = new Html5Qrcode("reader");
            
            // Configuración: usar cámara trasera ('environment')
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                isScanning = true;
                readerDiv.style.display = "block";
                btnStart.style.display = "none";
                btnStop.style.display = "block";
            })
            .catch(err => {
                alert("Error al acceder a la cámara. Asegúrate de dar permisos y usar HTTPS.");
                console.error(err);
            });
        });

        // Detener la cámara
        btnStop.addEventListener('click', detenerEscaner);

        function detenerEscaner() {
            if (isScanning && html5QrCode) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    readerDiv.style.display = "none";
                    btnStart.style.display = "block";
                    btnStop.style.display = "none";
                }).catch(err => {
                    console.error("Error al detener", err);
                });
            }
        }

        // Qué hacer cuando se lee un código exitosamente
        function onScanSuccess(decodedText, decodedResult) {
            // Evitar escanear el mismo código múltiples veces en el mismo segundo
            detenerEscaner(); // Detenemos la cámara temporalmente tras una lectura exitosa
            
            const ahora = new Date();
            const fecha = ahora.toLocaleDateString('es-ES');
            const hora = ahora.toLocaleTimeString('es-ES');

            // Guardar en el arreglo
            registrosQR.push({
                dato: decodedText,
                fecha: fecha,
                hora: hora
            });

            // Guardar en LocalStorage
            localStorage.setItem('registrosQR', JSON.stringify(registrosQR));
            
            // Actualizar interfaz
            renderizarHistorial();
            
            alert(`¡Código escaneado con éxito!\n\nDato: ${decodedText}`);
        }

        // Borrar el historial
        btnClear.addEventListener('click', () => {
            if(confirm('¿Estás seguro de que deseas borrar todos los registros?')) {
                registrosQR = [];
                localStorage.removeItem('registrosQR');
                renderizarHistorial();
            }
        });

        // Renderizar la lista al cargar la página por primera vez
        renderizarHistorial();
    </script>
</body>
</html>
